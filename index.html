<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#166534">
    <meta name="description" content="Free crop disease diagnosis for farmers. Works in Hindi, Kannada, Tamil, Telugu, Marathi and English.">
    <title>FarmPulse — Crop Diagnosis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --green: #166534;
            --green-light: #f0fdf4;
            --green-border: #bbf7d0;
            --border: #e5e7eb;
            --red: #dc2626;
            --red-light: #fef2f2;
            --red-border: #fecaca;
            --text-dark: #111827;
            --text-mid: #374151;
            --text-muted: #6b7280;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #bbf7d0;
            border-top-color: #166534;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .upload-box img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }
        
        .lang-btn.active {
            background: #166534;
            color: white;
        }
        
        .result-card {
            display: none;
        }
        
        .result-card.visible {
            display: block;
        }
        
        .loading-state {
            display: none;
        }
        
        .loading-state.visible {
            display: flex;
        }
        
        .error-state {
            display: none;
        }
        
        .error-state.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div style="max-width: 480px; margin: auto; padding: 20px;">
        <h1 style="color: #166534; text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 8px;">🌿 FarmPulse</h1>
        <p id="tagline" style="text-align: center; color: #374151; margin-bottom: 24px;"></p>

        <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px;">
            <button class="lang-btn active" data-lang="en" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #e5e7eb;">English</button>
            <button class="lang-btn" data-lang="hi" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #e5e7eb;">हिंदी</button>
            <button class="lang-btn" data-lang="kn" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #e5e7eb;">ಕನ್ನಡ</button>
            <button class="lang-btn" data-lang="ta" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #e5e7eb;">தமிழ்</button>
            <button class="lang-btn" data-lang="te" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #e5e7eb;">తెలుగు</button>
            <button class="lang-btn" data-lang="mr" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #e5e7eb;">मराठी</button>
        </div>

        <select id="crop-select" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e5e7eb; margin-bottom: 20px; font-size: 16px;">
            <option value="Tomato">Tomato</option>
            <option value="Rice">Rice</option>
            <option value="Wheat">Wheat</option>
            <option value="Potato">Potato</option>
            <option value="Cotton">Cotton</option>
            <option value="Maize">Maize</option>
        </select>

        <div id="upload-box" class="upload-box" style="position: relative; min-height: 180px; border: 2px dashed #166534; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 20px;">
            <span style="font-size: 32px; margin-bottom: 8px;">📷</span>
            <span id="upload-text" style="color: #374151;"></span>
            <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none">
        </div>

        <button id="diagnose-btn" style="width: 100%; background: #166534; color: white; padding: 16px; border-radius: 10px; font-size: 18px; font-weight: bold; margin-bottom: 20px; border: none; cursor: pointer;"></button>

        <div id="loading-state" class="loading-state" style="flex-direction: column; align-items: center; gap: 16px; padding: 32px 0;">
            <div class="spinner"></div>
            <p id="loading-text" style="color: #374151; font-weight: 500;"></p>
        </div>

        <div id="result-card" class="result-card" style="background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 14px; padding: 20px; margin-top: 8px; margin-bottom: 20px;">
            <p id="result-disease-label" style="font-size: 12px; text-transform: uppercase; color: #6b7280; font-weight: bold; margin-bottom: 4px;"></p>
            <h2 id="result-disease-name" style="font-size: 24px; color: #166534; font-weight: bold; margin-bottom: 16px; margin-top: 0;"></h2>
            
            <p id="result-treatment-label" style="font-size: 12px; text-transform: uppercase; color: #6b7280; font-weight: bold; margin-bottom: 4px;"></p>
            <p id="result-treatment-value" style="color: #374151; margin-bottom: 16px; margin-top: 0;"></p>
            
            <span id="severity-badge" style="display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; margin-bottom: 16px;"></span>
            
            <p id="result-medicines-label" style="font-size: 12px; text-transform: uppercase; color: #6b7280; font-weight: bold; margin-bottom: 4px;"></p>
            <div style="display: flex; flex-direction: row; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
                <div style="background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; flex: 1; min-width: 140px;">
                    <div id="result-medicine-1-name" style="color: #166534; font-size: 15px; font-weight: bold;"></div>
                    <div id="result-medicine-1-use" style="color: #6b7280; font-size: 13px; margin-top: 4px;"></div>
                </div>
                <div style="background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; flex: 1; min-width: 140px;">
                    <div id="result-medicine-2-name" style="color: #166534; font-size: 15px; font-weight: bold;"></div>
                    <div id="result-medicine-2-use" style="color: #6b7280; font-size: 13px; margin-top: 4px;"></div>
                </div>
            </div>
            
            <button id="speak-btn" style="width: 100%; background: white; color: #166534; border: 2px solid #166534; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer;"></button>
        </div>

        <div id="error-state" class="error-state" style="background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px; padding: 14px; color: #dc2626; margin-bottom: 20px; text-align: center;"></div>
    </div>

    <script>
        const API_KEY = 'PASTE_KEY_HERE';

        const translations = {
            en: { tagline: 'Free crop disease diagnosis', crop_label: 'Select your crop', upload_text: 'Tap to take photo or upload', diagnose: 'Diagnose Now', loading: 'Analysing your crop...', disease_label: 'DISEASE DETECTED', treatment_label: 'WHAT TO DO', medicines_label: 'RECOMMENDED MEDICINES', product_label: 'WHAT TO BUY', speak: '🔊 Hear diagnosis aloud', error: 'Could not diagnose. Please take a clearer photo of a sick leaf and try again.', lang_code: 'en-IN' },
            hi: { tagline: 'मुफ्त फसल रोग निदान', crop_label: 'अपनी फसल चुनें', upload_text: 'फोटो लें या अपलोड करें', diagnose: 'जांच करें', loading: 'फसल का विश्लेषण हो रहा है...', disease_label: 'पहचाना गया रोग', treatment_label: 'क्या करें', medicines_label: 'अनुशंसित दवाएं', product_label: 'क्या खरीदें', speak: '🔊 निदान सुनें', error: 'निदान नहीं हो सका। बीमार पत्ते की साफ फोटो लेकर दोबारा कोशिश करें।', lang_code: 'hi-IN' },
            kn: { tagline: 'ಉಚಿತ ಬೆಳೆ ರೋಗ ನಿರ್ಣಯ', crop_label: 'ನಿಮ್ಮ ಬೆಳೆ ಆಯ್ಕೆಮಾಡಿ', upload_text: 'ಫೋಟೋ ತೆಗೆಯಿರಿ ಅಥವಾ ಅಪ್ಲೋಡ್ ಮಾಡಿ', diagnose: 'ರೋಗನಿರ್ಣಯ ಮಾಡಿ', loading: 'ವಿಶ್ಲೇಷಿಸಲಾಗುತ್ತಿದೆ...', disease_label: 'ಪತ್ತೆಯಾದ ರೋಗ', treatment_label: 'ಏನು ಮಾಡಬೇಕು', medicines_label: 'ಶಿಫಾರಸು ಮಾಡಿದ ಔಷಧಗಳು', product_label: 'ಏನು ಕೊಳ್ಳಬೇಕು', speak: '🔊 ನಿರ್ಣಯ ಕೇಳಿ', error: 'ರೋಗನಿರ್ಣಯ ಸಾಧ್ಯವಾಗಲಿಲ್ಲ. ರೋಗಗ್ರಸ್ತ ಎಲೆಯ ಸ್ಪಷ್ಟ ಫೋಟೋ ತೆಗೆದು ಮತ್ತೆ ಪ್ರಯತ್ನಿಸಿ.', lang_code: 'kn-IN' },
            ta: { tagline: 'இலவச பயிர் நோய் கண்டறிதல்', crop_label: 'உங்கள் பயிரை தேர்ந்தெடுங்கள்', upload_text: 'புகைப்படம் எடுக்கவும் அல்லது பதிவேற்றவும்', diagnose: 'கண்டறி', loading: 'பகுப்பாய்வு செய்கிறது...', disease_label: 'கண்டறியப்பட்ட நோய்', treatment_label: 'என்ன செய்வது', medicines_label: 'பரிந்துரைக்கப்பட்ட மருந்துகள்', product_label: 'என்ன வாங்குவது', speak: '🔊 கண்டறிதலை கேளுங்கள்', error: 'கண்டறிய முடியவில்லை. நோயுற்ற இலையின் தெளிவான புகைப்படம் எடுத்து மீண்டும் முயற்சிக்கவும்.', lang_code: 'ta-IN' },
            te: { tagline: 'ఉచిత పంట వ్యాధి నిర్ధారణ', crop_label: 'మీ పంటను ఎంచుకోండి', upload_text: 'ఫోటో తీయండి లేదా అప్లోడ్ చేయండి', diagnose: 'నిర్ధారించు', loading: 'విశ్లేషిస్తోంది...', disease_label: 'గుర్తించిన వ్యాధి', treatment_label: 'ఏమి చేయాలి', medicines_label: 'సిఫార్సు చేయబడిన మందులు', product_label: 'ఏమి కొనాలి', speak: '🔊 ನಿರ್ధారణ వినండి', error: 'నిర్ధారించలేకపోయాము. జబ్బుపడిన ఆకు యొక్క స్పష్టమైన ఫోటో తీసి మళ్ళీ ప్రయత్నించండి.', lang_code: 'te-IN' },
            mr: { tagline: 'मोफत पीक रोग निदान', crop_label: 'तुमचे पीक निवडा', upload_text: 'फोटो घ्या किंवा अपलोड करा', diagnose: 'निदान करा', loading: 'विश्लेषण होत आहे...', disease_label: 'आढळलेला रोग', treatment_label: 'काय करावे', medicines_label: 'शिफारस केलेली औषधे', product_label: 'काय विकत घ्यावे', speak: '🔊 निदान ऐका', error: 'निदान शक्य नाही. आजारी पानाचा स्पष्ट फोटो घेऊन पुन्हा प्रयत्न करा.', lang_code: 'mr-IN' }
        };

        let selectedLang = 'en';
        let compressedBase64 = null;
        let lastResult = null;

        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const canvas = document.createElement('canvas');
                const reader = new FileReader();

                reader.onload = (e) => {
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        const max_dim = 800;

                        if (width > height) {
                            if (width > max_dim) {
                                height *= max_dim / width;
                                width = max_dim;
                            }
                        } else {
                            if (height > max_dim) {
                                width *= max_dim / height;
                                height = max_dim;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        const base64 = dataUrl.replace(/^data:image\/jpeg;base64,/, '');
                        resolve(base64);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function diagnose(base64Image, cropType, language) {
            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 500,
                        messages: [{
                            role: 'user',
                            content: [
                                {
                                    type: 'image',
                                    source: {
                                        type: 'base64',
                                        media_type: 'image/jpeg',
                                        data: base64Image
                                    }
                                },
                                {
                                    type: 'text',
                                    text: `You are a plant disease expert helping a small-scale farmer. The farmer grows ${cropType}. Respond ONLY in ${language}. Return ONLY a raw JSON object with no markdown, no backticks, no explanation. JSON must have exactly: disease_name (string), severity (exactly one of: High, Medium, Low), treatment (string, one simple action max 15 words), medicines (array of exactly 2 objects, each with name (string, a specific real product name) and how_to_use (string, max 15 words)). If image is not a diseased plant set disease_name to Not a plant disease, severity to Low, treatment to Please take a clear photo of a sick leaf, medicines to [{name: None, how_to_use: Not applicable}, {name: None, how_to_use: Not applicable}].`
                                }
                            ]
                        }]
                    })
                });

                if (!response.ok) throw new Error('API Error');
                
                const data = await response.json();
                return JSON.parse(data.content[0].text);
            } catch (error) {
                console.error(error);
                return null;
            }
        }

        function speak(text, langCode) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = langCode;
            utterance.rate = 0.85;
            utterance.pitch = 1;
            window.speechSynthesis.speak(utterance);
        }

        function updateUI() {
            const t = translations[selectedLang];
            document.getElementById('tagline').textContent = t.tagline;
            document.getElementById('upload-text').textContent = t.upload_text;
            document.getElementById('diagnose-btn').textContent = t.diagnose;
            document.getElementById('loading-text').textContent = t.loading;
            document.getElementById('speak-btn').textContent = t.speak;
            
            if (lastResult !== null) {
                document.getElementById('result-disease-label').textContent = t.disease_label;
                document.getElementById('result-treatment-label').textContent = t.treatment_label;
                document.getElementById('result-medicines-label').textContent = t.medicines_label;
            }
        }

        updateUI();

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                selectedLang = btn.getAttribute('data-lang');
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateUI();
            });
        });

        document.getElementById('upload-box').addEventListener('click', () => {
            document.getElementById('file-input').click();
        });

        document.getElementById('file-input').addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                compressImage(e.target.files[0]).then(base64 => {
                    compressedBase64 = base64;
                    const img = document.createElement('img');
                    img.src = 'data:image/jpeg;base64,' + compressedBase64;
                    const uploadBox = document.getElementById('upload-box');
                    const fileInput = document.getElementById('file-input');
                    uploadBox.innerHTML = '';
                    uploadBox.appendChild(img);
                    uploadBox.appendChild(fileInput);
                }).catch(console.error);
            }
        });

        document.getElementById('diagnose-btn').addEventListener('click', () => {
            if (!compressedBase64) {
                alert('Please select a photo first');
                return;
            }

            const cropValue = document.getElementById('crop-select').value;
            const langNames = { en: 'English', hi: 'Hindi', kn: 'Kannada', ta: 'Tamil', te: 'Telugu', mr: 'Marathi' };
            
            const resultCard = document.getElementById('result-card');
            const errorState = document.getElementById('error-state');
            const loadingState = document.getElementById('loading-state');
            const diagnoseBtn = document.getElementById('diagnose-btn');

            resultCard.classList.remove('visible');
            errorState.classList.remove('visible');
            loadingState.classList.add('visible');
            diagnoseBtn.disabled = true;

            diagnose(compressedBase64, cropValue, langNames[selectedLang]).then(result => {
                loadingState.classList.remove('visible');
                diagnoseBtn.disabled = false;

                if (!result) {
                    errorState.classList.add('visible');
                    errorState.textContent = translations[selectedLang].error;
                    return;
                }

                document.getElementById('result-disease-name').textContent = result.disease_name;
                document.getElementById('result-treatment-value').textContent = result.treatment;
                
                const severityBadge = document.getElementById('severity-badge');
                severityBadge.textContent = result.severity;
                if (result.severity === 'High') {
                    severityBadge.style.background = '#fef2f2';
                    severityBadge.style.color = '#dc2626';
                    severityBadge.style.border = '1px solid #fecaca';
                } else if (result.severity === 'Medium') {
                    severityBadge.style.background = '#fffbeb';
                    severityBadge.style.color = '#92400e';
                    severityBadge.style.border = '1px solid #fde68a';
                } else {
                    severityBadge.style.background = '#f0fdf4';
                    severityBadge.style.color = '#166534';
                    severityBadge.style.border = '1px solid #bbf7d0';
                }
                
                document.getElementById('result-medicine-1-name').textContent = result.medicines[0].name;
                document.getElementById('result-medicine-1-use').textContent = result.medicines[0].how_to_use;
                document.getElementById('result-medicine-2-name').textContent = result.medicines[1].name;
                document.getElementById('result-medicine-2-use').textContent = result.medicines[1].how_to_use;
                
                const t = translations[selectedLang];
                document.getElementById('result-disease-label').textContent = t.disease_label;
                document.getElementById('result-treatment-label').textContent = t.treatment_label;
                document.getElementById('result-medicines-label').textContent = t.medicines_label;

                resultCard.classList.add('visible');
                lastResult = result;
            });
        });

        document.getElementById('speak-btn').addEventListener('click', () => {
            if (!lastResult) return;
            const t = translations[selectedLang];
            const text = `${t.disease_label}. ${lastResult.disease_name}. ${t.treatment_label}. ${lastResult.treatment}. ${t.medicines_label}. ${lastResult.medicines[0].name}. ${lastResult.medicines[1].name}.`;
            speak(text, t.lang_code);
        });
    </script>
</body>
</html>
