<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#166534" />
  <meta name="description" content="Free crop disease diagnosis for farmers. Works in Hindi, Kannada, Tamil, Telugu, Marathi and English." />
  <title>FarmPulse — Crop Diagnosis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    :root {
      --green: #166534;
      --green-light: #f0fdf4;
      --green-border: #bbf7d0;
      --border: #e5e7eb;
      --red: #dc2626;
      --red-light: #fef2f2;
      --red-border: #fecaca;
      --text-dark: #111827;
      --text-mid: #374151;
      --text-muted: #6b7280;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #bbf7d0;
      border-top-color: #166534;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .upload-box img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }

    .lang-btn.active {
      background: #166534;
      color: white;
    }

    .result-card,
    .loading-state,
    .error-state {
      display: none;
    }

    .result-card.visible,
    .error-state.visible {
      display: block;
    }

    .loading-state.visible {
      display: flex;
    }
  </style>
</head>

<body>
  <div style="max-width:480px; margin:auto; padding:20px;">

    <h1 style="color:#166534; text-align:center; font-size:24px; font-weight:bold; margin-bottom:8px;">
      🌿 FarmPulse
    </h1>

    <p id="tagline" style="text-align:center; color:#374151; margin-bottom:24px;"></p>

    <!-- Language buttons -->
    <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:20px;">
      <button class="lang-btn active" data-lang="en" style="padding:8px 12px; border-radius:8px; border:1px solid #e5e7eb;">English</button>
      <button class="lang-btn" data-lang="hi" style="padding:8px 12px; border-radius:8px; border:1px solid #e5e7eb;">हिंदी</button>
      <button class="lang-btn" data-lang="kn" style="padding:8px 12px; border-radius:8px; border:1px solid #e5e7eb;">ಕನ್ನಡ</button>
      <button class="lang-btn" data-lang="ta" style="padding:8px 12px; border-radius:8px; border:1px solid #e5e7eb;">தமிழ்</button>
      <button class="lang-btn" data-lang="te" style="padding:8px 12px; border-radius:8px; border:1px solid #e5e7eb;">తెలుగు</button>
      <button class="lang-btn" data-lang="mr" style="padding:8px 12px; border-radius:8px; border:1px solid #e5e7eb;">मराठी</button>
    </div>

    <!-- Crop selector -->
    <select id="crop-select" style="width:100%; padding:12px; border-radius:8px; border:1px solid #e5e7eb; margin-bottom:20px; font-size:16px;">
      <option value="Tomato">Tomato</option>
      <option value="Rice">Rice</option>
      <option value="Wheat">Wheat</option>
      <option value="Potato">Potato</option>
      <option value="Cotton">Cotton</option>
      <option value="Maize">Maize</option>
    </select>

    <!-- Upload box -->
    <div id="upload-box" class="upload-box" style="position:relative; min-height:180px; border:2px dashed #166534; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; margin-bottom:20px; overflow:hidden;">
      <span style="font-size:32px; margin-bottom:8px;">📷</span>
      <span id="upload-text" style="color:#374151;"></span>
      <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" />
    </div>

    <!-- Diagnose button -->
    <button id="diagnose-btn" style="width:100%; background:#166534; color:white; padding:16px; border-radius:10px; font-size:18px; font-weight:bold; margin-bottom:20px; border:none; cursor:pointer;"></button>

    <!-- Loading -->
    <div id="loading-state" class="loading-state" style="flex-direction:column; align-items:center; gap:16px; padding:32px 0;">
      <div class="spinner"></div>
      <p id="loading-text" style="color:#374151; font-weight:500;"></p>
    </div>

    <!-- Result card -->
    <div id="result-card" class="result-card" style="background:#f0fdf4; border:1px solid #bbf7d0; border-radius:14px; padding:20px; margin-top:8px; margin-bottom:20px;">

      <!-- Disease name -->
      <p id="result-disease-label" style="font-size:12px; text-transform:uppercase; color:#6b7280; font-weight:bold; margin-bottom:4px;"></p>
      <h2 id="result-disease-name" style="font-size:24px; color:#166534; font-weight:bold; margin-bottom:10px; margin-top:0;"></h2>

      <!-- Severity badge -->
      <div id="result-severity-wrap" style="margin-bottom:16px;">
        <span id="result-severity-badge" class="severity-badge"></span>
      </div>

      <!-- Treatment -->
      <p id="result-treatment-label" style="font-size:12px; text-transform:uppercase; color:#6b7280; font-weight:bold; margin-bottom:4px;"></p>
      <p id="result-treatment-value" style="color:#374151; margin-bottom:16px; margin-top:0;"></p>

      <!-- Medicines -->
      <p id="result-product-label" style="font-size:12px; text-transform:uppercase; color:#6b7280; font-weight:bold; margin-bottom:8px;"></p>
      <div id="result-medicines"></div>

      <!-- Home remedies -->
      <div class="remedies-box" id="remedies-box" style="display:none;">
        <h3 id="remedies-title">🏡 Home Remedies</h3>
        <ul id="remedies-list"></ul>
      </div>

      <!-- Nearby store button -->
      <button id="nearby-btn" class="nearby-btn">📍 Find nearby medicine provider</button>

      <!-- Speak button -->
      <button id="speak-btn" style="width:100%; background:white; color:#166534; border:2px solid #166534; padding:12px; border-radius:8px; font-weight:bold; font-size:16px; cursor:pointer;"></button>
    </div>

    <!-- Error -->
    <div id="error-state" class="error-state" style="background:#fef2f2; border:1px solid #fecaca; border-radius:10px; padding:14px; color:#dc2626; margin-bottom:20px; text-align:center;"></div>

  </div><!-- /main container -->

  <script type="module">
    import { compressImage, diagnose, speak, getUserLocation, openNearbyMedicineProviders, getHomeRemedies } from './app.js';
    window.compressImage = compressImage;
    window.diagnose = diagnose;
    window.speak = speak;
    window.getUserLocation = getUserLocation;
    window.openNearbyMedicineProviders = openNearbyMedicineProviders;
    window.getHomeRemedies = getHomeRemedies;
  </script>

  <script>
    /* ─── CONFIG ──────────────────────────────────────────────── */
    const GEMINI_API_KEY = 'PASTE_YOUR_GEMINI_API_KEY_HERE';

    /* ─── TRANSLATIONS ────────────────────────────────────────── */
    const translations = {
      en: {
        tagline: 'Free crop disease diagnosis',
        upload_text: 'Tap to take photo or upload',
        diagnose: 'Diagnose Now',
        loading: 'Analysing your crop...',
        disease_label: 'DISEASE DETECTED',
        severity_label: 'SEVERITY',
        treatment_label: 'WHAT TO DO',
        product_label: 'WHAT TO BUY',
        remedies_title: '🏡 Home Remedies',
        speak: '🔊 Hear diagnosis aloud',
        error: 'Could not diagnose. Please take a clearer photo of a sick leaf and try again.',
        lang_code: 'en-IN',
        nearby: '📍 Find nearby medicine provider'
      },
      hi: {
        tagline: 'मुफ्त फसल रोग निदान',
        upload_text: 'फोटो लें या अपलोड करें',
        diagnose: 'जांच करें',
        loading: 'फसल का विश्लेषण हो रहा है...',
        disease_label: 'पहचाना गया रोग',
        severity_label: 'गंभीरता',
        treatment_label: 'क्या करें',
        product_label: 'क्या खरीदें',
        remedies_title: '🏡 घरेलू उपाय',
        speak: '🔊 निदान सुनें',
        error: 'निदान नहीं हो सका। बीमार पत्ते की साफ फोटो लेकर दोबारा कोशिश करें।',
        lang_code: 'hi-IN',
        nearby: '📍 नजदीकी दुकान खोजें'
      },
      kn: {
        tagline: 'ಉಚಿತ ಬೆಳೆ ರೋಗ ನಿರ್ಣಯ',
        upload_text: 'ಫೋಟೋ ತೆಗೆಯಿರಿ ಅಥವಾ ಅಪ್ಲೋಡ್ ಮಾಡಿ',
        diagnose: 'ರೋಗನಿರ್ಣಯ ಮಾಡಿ',
        loading: 'ವಿಶ್ಲೇಷಿಸಲಾಗುತ್ತಿದೆ...',
        disease_label: 'ಪತ್ತೆಯಾದ ರೋಗ',
        severity_label: 'ತೀವ್ರತೆ',
        treatment_label: 'ಏನು ಮಾಡಬೇಕು',
        product_label: 'ಏನು ಕೊಳ್ಳಬೇಕು',
        remedies_title: '🏡 ಮನೆ ಪರಿಹಾರಗಳು',
        speak: '🔊 ನಿರ್ಣಯ ಕೇಳಿ',
        error: 'ರೋಗನಿರ್ಣಯ ಸಾಧ್ಯವಾಗಲಿಲ್ಲ. ಸ್ಪಷ್ಟ ಫೋಟೋ ತೆಗೆದು ಮತ್ತೆ ಪ್ರಯತ್ನಿಸಿ.',
        lang_code: 'kn-IN',
        nearby: '📍 ಹತ್ತಿರದ ಅಂಗಡಿ ಹುಡುಕಿ'
      },
      ta: {
        tagline: 'இலவச பயிர் நோய் கண்டறிதல்',
        upload_text: 'புகைப்படம் எடுக்கவும் அல்லது பதிவேற்றவும்',
        diagnose: 'கண்டறி',
        loading: 'பகுப்பாய்வு செய்கிறது...',
        disease_label: 'கண்டறியப்பட்ட நோய்',
        severity_label: 'தீவிரம்',
        treatment_label: 'என்ன செய்வது',
        product_label: 'என்ன வாங்குவது',
        remedies_title: '🏡 வீட்டு வைத்தியம்',
        speak: '🔊 கண்டறிதலை கேளுங்கள்',
        error: 'கண்டறிய முடியவில்லை. தெளிவான புகைப்படம் எடுத்து மீண்டும் முயற்சிக்கவும்.',
        lang_code: 'ta-IN',
        nearby: '📍 அருகிலுள்ள கடையைத் தேடுங்கள்'
      },
      te: {
        tagline: 'ఉచిత పంట వ్యాధి నిర్ధారణ',
        upload_text: 'ఫోటో తీయండి లేదా అప్లోడ్ చేయండి',
        diagnose: 'నిర్ధారించు',
        loading: 'విశ్లేషిస్తోంది...',
        disease_label: 'గుర్తించిన వ్యాధి',
        severity_label: 'తీవ్రత',
        treatment_label: 'ఏమి చేయాలి',
        product_label: 'ఏమి కొనాలి',
        remedies_title: '🏡 ఇంటి చిట్కాలు',
        speak: '🔊 నిర్ధారణ వినండి',
        error: 'నిర్ధారించలేకపోయాము. స్పష్టమైన ఫోటో తీసి మళ్ళీ ప్రయత్నించండి.',
        lang_code: 'te-IN',
        nearby: '📍 దగ్గరలోని దుకాణం వెతకండి'
      },
      mr: {
        tagline: 'मोफत पीक रोग निदान',
        upload_text: 'फोटो घ्या किंवा अपलोड करा',
        diagnose: 'निदान करा',
        loading: 'विश्लेषण होत आहे...',
        disease_label: 'आढळलेला रोग',
        severity_label: 'तीव्रता',
        treatment_label: 'काय करावे',
        product_label: 'काय विकत घ्यावे',
        remedies_title: '🏡 घरगुती उपाय',
        speak: '🔊 निदान ऐका',
        error: 'निदान शक्य नाही. आजारी पानाचा स्पष्ट फोटो घेऊन पुन्हा प्रयत्न करा.',
        lang_code: 'mr-IN',
        nearby: '📍 जवळची दुकाने शोधा'
      }
    };

    /* ─── STATE ───────────────────────────────────────────────── */
    let selectedLang = 'en';
    let compressedBase64 = null;
    let lastResult = null;

    /* ─── Core functions imported from app.js via module bridge ─ */

    /* ─── UI HELPERS ──────────────────────────────────────────── */
    function getSeverityClass(severity) {
      if (!severity) return '';
      const s = severity.toLowerCase();
      if (s === 'high')   return 'severity-high';
      if (s === 'medium') return 'severity-medium';
      return 'severity-low';
    }

    function renderMedicines(medicines) {
      if (!medicines || !medicines.length) return '';
      return medicines.map(m => `
        <div class="medicine-card">
          <div class="medicine-name">💊 ${m.name}</div>
          <div class="medicine-use">${m.how_to_use}</div>
        </div>
      `).join('');
    }

    function updateUI() {
      const t = translations[selectedLang];
      document.getElementById('tagline').textContent       = t.tagline;
      document.getElementById('upload-text').textContent   = t.upload_text;
      document.getElementById('diagnose-btn').textContent  = t.diagnose;
      document.getElementById('loading-text').textContent  = t.loading;
      document.getElementById('speak-btn').textContent     = t.speak;
      document.getElementById('nearby-btn').textContent    = t.nearby;
      if (lastResult) {
        document.getElementById('result-disease-label').textContent  = t.disease_label;
        document.getElementById('result-treatment-label').textContent = t.treatment_label;
        document.getElementById('result-product-label').textContent  = t.product_label;
        document.getElementById('remedies-title').textContent        = t.remedies_title;
      }
    }

    updateUI();

    /* ─── LANGUAGE BUTTONS ────────────────────────────────────── */
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedLang = btn.getAttribute('data-lang');
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateUI();
      });
    });

    /* ─── UPLOAD ──────────────────────────────────────────────── */
    document.getElementById('upload-box').addEventListener('click', () => {
      document.getElementById('file-input').click();
    });

    document.getElementById('file-input').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      compressImage(file).then(base64 => {
        compressedBase64 = base64;
        const img = document.createElement('img');
        img.src = 'data:image/jpeg;base64,' + base64;
        const box = document.getElementById('upload-box');
        const input = document.getElementById('file-input');
        box.innerHTML = '';
        box.appendChild(img);
        box.appendChild(input);
      }).catch(console.error);
    });

    /* ─── DIAGNOSE BUTTON ─────────────────────────────────────── */
    document.getElementById('diagnose-btn').addEventListener('click', () => {
      if (!compressedBase64) { alert('Please select a photo first'); return; }

      const langNames = { en:'English', hi:'Hindi', kn:'Kannada', ta:'Tamil', te:'Telugu', mr:'Marathi' };
      const cropValue = document.getElementById('crop-select').value;

      const resultCard  = document.getElementById('result-card');
      const errorState  = document.getElementById('error-state');
      const loadingState = document.getElementById('loading-state');
      const diagnoseBtn = document.getElementById('diagnose-btn');

      resultCard.classList.remove('visible');
      errorState.classList.remove('visible');
      loadingState.classList.add('visible');
      diagnoseBtn.disabled = true;

      diagnose(compressedBase64, cropValue, langNames[selectedLang]).then(result => {
        loadingState.classList.remove('visible');
        diagnoseBtn.disabled = false;

        if (!result) {
          errorState.classList.add('visible');
          errorState.textContent = translations[selectedLang].error;
          return;
        }

        lastResult = result;
        const t = translations[selectedLang];

        /* Disease name */
        document.getElementById('result-disease-label').textContent = t.disease_label;
        document.getElementById('result-disease-name').textContent  = result.disease_name;

        /* Severity badge */
        const badge = document.getElementById('result-severity-badge');
        badge.textContent  = result.severity || '';
        badge.className    = 'severity-badge ' + getSeverityClass(result.severity);

        /* Treatment */
        document.getElementById('result-treatment-label').textContent = t.treatment_label;
        document.getElementById('result-treatment-value').textContent = result.treatment;

        /* Medicine cards */
        document.getElementById('result-product-label').textContent = t.product_label;
        document.getElementById('result-medicines').innerHTML = renderMedicines(result.medicines);

        /* Home remedies */
        const remediesBox = document.getElementById('remedies-box');
        document.getElementById('remedies-title').textContent = t.remedies_title;
        const remedies = getHomeRemedies(result.disease_name);
        document.getElementById('remedies-list').innerHTML = remedies.map(r => `<li>${r}</li>`).join('');
        const isNotDisease = result.disease_name.toLowerCase().includes('not a plant');
        remediesBox.style.display = isNotDisease ? 'none' : 'block';

        resultCard.classList.add('visible');
      });
    });

    /* ─── SPEAK BUTTON ────────────────────────────────────────── */
    document.getElementById('speak-btn').addEventListener('click', () => {
      if (!lastResult) return;
      const t = translations[selectedLang];
      const meds = (lastResult.medicines || []).map(m => m.name).filter(n => n !== 'None').join(', ');
      const text = `${t.disease_label}. ${lastResult.disease_name}. ${t.treatment_label}. ${lastResult.treatment}. ${t.product_label}. ${meds}.`;
      speak(text, t.lang_code);
    });

    /* ─── NEARBY BUTTON ───────────────────────────────────────── */
    document.getElementById('nearby-btn').addEventListener('click', () => {
      if (!lastResult) return;
      const firstMed = (lastResult.medicines && lastResult.medicines[0]) ? lastResult.medicines[0].name : '';
      openNearbyMedicineProviders(firstMed, lastResult.disease_name);
    });
  </script>

  <script src="farmpulse-magic.js"></script>
</body>
</html>
